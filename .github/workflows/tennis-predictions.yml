name: Tennis Predictions
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run modular prediction pipeline
        run: python3 prediction.py
      - name: Commit updated model state and predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions.json index.html model_state_atp.json model_state_wta.json
          git diff --staged --quiet || git commit -m "Daily tennis model update"
          git push
