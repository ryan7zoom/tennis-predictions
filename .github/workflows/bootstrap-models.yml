name: Bootstrap Tennis Model
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Bootstrap model from free historical data
        run: python3 backfill_models.py
      - name: Commit model states
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model_state_atp.json model_state_wta.json
          git diff --staged --quiet || git commit -m "Bootstrap modular tennis model"
          git push
